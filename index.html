<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Reminder for Smerithee 💛</title>
    <!-- Google Fonts for cute and modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Outfit:wght@100..900&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- canvas-confetti library for high-quality celebrations -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <!-- Floating Hearts & Bananas Background Container -->
    <div class="floating-hearts" id="hearts-container"></div>

    <main class="app-container">
        <!-- SCREEN 1: Envelope Letter -->
        <section class="screen active" id="screen-envelope">
            <div class="envelope-wrapper">
                <div class="envelope" id="envelope">
                    <div class="flap"></div>
                    <div class="pocket"></div>
                    <div class="letter">
                        <div class="letter-content">
                            <p class="handwritten">To Smerithee</p>
                            <p class="click-prompt">Click to open 💛</p>
                        </div>
                    </div>
                </div>
                <div class="envelope-shadow"></div>
            </div>
            <h1 class="envelope-heading">Smerithee, you have a message... 💌</h1>
        </section>

        <!-- SCREEN 2: The Motivational Cheer Card -->
        <section class="screen" id="screen-cheer">
            <div class="card glassmorphism cheer-card">
                <div class="image-container">
                    <img src="assets/minion_support.png" alt="Cute cheering minion" class="illustration pulse-img">
                </div>
                <h1 class="cheer-heading text-yellow">You got this, Smerithee! 🌟</h1>
                
                <!-- Encouragement Quote Display -->
                <div class="quote-container">
                    <div id="quote-display" class="quote-box">
                        Remember: You are one in a Minion! 💛🍌
                    </div>
                </div>
                
                <div class="button-group">
                    <button id="btn-cheer" class="btn btn-cheer">Cheer me up! 🍌</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
